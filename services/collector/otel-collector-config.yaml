# otel-collector-config.yaml
receivers:
  otlp:
    protocols:
      grpc: {endpoint: 0.0.0.0:4317}
      http: {endpoint: 0.0.0.0:4318}

processors:
  memory_limiter:
    limit_mib: 128
    check_interval: 1s
  batch:

exporters:
  # pipeline data ➜ Prometheus (scraped on :8889)
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:   # stop adding constant labels
      enabled: false

  # traces ➜ Jaeger
  otlp:
    endpoint: jaeger:14250
    tls: {insecure: true}

  # logs ➜ OpenSearch
  opensearch:
    http:
      endpoint: http://opensearch:9200
      tls: {insecure: true}
    logs_index: otel-logs

service:
  telemetry:                # ← INTERNAL METRICS on :8888
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
                without_units: true

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]

    metrics:
      receivers: [otlp]              # no “self” receiver needed
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [opensearch]

