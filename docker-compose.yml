---

x-build-env:

  BUILDKIT_INLINE_CACHE: "1"
  BUILDKIT_PROGRESS: plain
  DOCKER_BUILDKIT: "1"

name: mindfield

services:

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - type: bind
        source: ./services/alertmanager/alertmanager.yml
        target: /etc/alertmanager/alertmanager.yml
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
      monitoring: null
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    cpus: 0.25
    mem_limit: "134217728"

  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.api
      args:
        NODE_MAJOR: ${NODE_MAJOR}
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
    cpus: 1
    mem_limit: "536870912"
    read_only: true
    tmpfs:
      - /tmp

  backup:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.backup
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    volumes:
      - type: bind
        source: ./database/backups
        target: /backups
        bind:
          create_host_path: true
      - type: bind
        source: ./services/backup/backup.sh
        target: /backup.sh
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
    command:
      - sh
      - /backup.sh
    cpus: 0.25
    mem_limit: "134217728"

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    volumes:
      - type: bind
        source: ./services/blackbox/blackbox.yml
        target: /etc/blackbox_exporter/config.yml
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
      monitoring: null
    cpus: 0.25
    mem_limit: "134217728"

  caddy:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.caddy
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    volumes:
      - type: bind
        source: ./services/caddy/Caddyfile
        target: /etc/caddy/Caddyfile
        bind:
          create_host_path: true
      - type: bind
        source: ./caddy/data
        target: /data
        bind:
          create_host_path: true
      - type: bind
        source: ./caddy/config
        target: /config
        bind:
          create_host_path: true
    env_file:
      - .env
    ports:
      - mode: ingress
        target: 80
        published: "80"
        host_ip: 0.0.0.0
        protocol: tcp
      - mode: ingress
        target: 443
        published: "443"
        host_ip: 0.0.0.0
        protocol: tcp
    networks:
      backend: null
      frontend: null
      monitoring: null
    cpus: 0.25
    mem_limit: "134217728"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      mailhog:
        condition: service_started
        required: true
    volumes:
      - type: volume
        source: grafana_data
        target: /var/lib/grafana
        volume: {}
      - type: volume
        source: grafana_provisioning
        target: /etc/grafana/provisioning
        volume: {}
      - type: volume
        source: grafana_dashboards
        target: /var/lib/grafana/dashboards
        volume: {}
    env_file:
      - .env
    networks:
      frontend: null
      monitoring: null
    cpus: 0.5
    mem_limit: "268435456"

  grapesjs:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.grapesjs
      args:
        NODE_MAJOR: "24"
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      minio:
        condition: service_healthy
        required: true
      pgbouncer:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 0.5
    mem_limit: "268435456"

  hasura:
    image: hasura/graphql-engine:latest
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 0.5
    mem_limit: "536870912"

  jaeger:
    image: jaegertracing/all-in-one:latest
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
      monitoring: null
    cpus: 0.5
    mem_limit: "268435456"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    depends_on:
      mailhog:
        condition: service_healthy
        required: true
      pgbouncer:
        condition: service_healthy
        required: true
    volumes:
      - type: volume
        source: keycloak_data
        target: /opt/keycloak/data
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    command:
      - start-dev
    cpus: 0.5
    mem_limit: "536870912"

  kong:
    image: revomatico/docker-kong-oidc:3.4.0-2
    depends_on:
      kong-database:
        condition: service_healthy
        required: true
      kong-migrations:
        condition: service_completed_successfully
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    healthcheck:
      test:
        - CMD
        - kong
        - health
      timeout: 10s
      interval: 10s
      retries: 3
    cpus: 1
    mem_limit: "1073741824"

  kong-configure:
    image: curlimages/curl:latest
    depends_on:
      kong:
        condition: service_healthy
        required: true
    volumes:
      - type: bind
        source: ./services/kong/configure.sh
        target: /configure.sh
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
    command:
      - sh
      - /configure.sh
    restart: "no"
    cpus: 0.25

  kong-database:
    image: postgres:15-alpine
    volumes:
      - type: volume
        source: kong_db_data
        target: /var/lib/postgresql/data
        volume: {}
    environment:
      POSTGRES_DB: ${KONG_POSTGRES_DB}
      POSTGRES_USER: ${KONG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KONG_POSTGRES_PASSWORD}
    env_file:
      - .env
    networks:
      backend: null
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U kong
      timeout: 5s
      interval: 10s
      retries: 5
    cpus: 0.5
    mem_limit: "268435456"

  kong-migrations:
    image: kong:3.4.0
    depends_on:
      kong-database:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
    command:
      - kong
      - migrations
      - bootstrap
    restart: "no"
    cpus: 0.25

  loki:
    image: grafana/loki:latest
    volumes:
      - type: bind
        source: ./services/loki/loki-config.yml
        target: /etc/loki/local-config.yaml
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
      monitoring: null
    command:
      - -config.file=/etc/loki/local-config.yaml
    cpus: 0.5
    mem_limit: "536870912"

  mailhog:
    image: mailhog/mailhog:latest
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    healthcheck:
      test:
        - CMD
        - "true"
      timeout: 3s
      interval: 30s
      retries: 3
    cpus: 0.25
    mem_limit: "134217728"

  minio:
    image: minio/minio:latest
    volumes:
      - type: volume
        source: minio_data
        target: /data
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
    command:
      - server
      - /data
      - --console-address
      - :9001
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      timeout: 20s
      interval: 30s
      retries: 3
    cpus: 0.5
    mem_limit: "268435456"

  mkdocs:
    image: squidfunk/mkdocs-material:latest
    volumes:
      - type: bind
        source: ./docs
        target: /docs
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    command:
      - serve
      - --dev-addr=0.0.0.0:8000
    working_dir: /docs
    cpus: 0.25
    mem_limit: "134217728"

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          propagation: rslave
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
      monitoring: null
    command:
      - --path.rootfs=/host
    cpus: 0.25
    mem_limit: "134217728"
    pid: host

  opensearch:
    image: opensearchproject/opensearch:latest
    volumes:
      - type: volume
        source: opensearch_data
        target: /usr/share/opensearch/data
        volume: {}
    environment:
      bootstrap.memory_lock: "true"
      cluster.name: mindfield-cluster
      discovery.type: single-node
      node.name: opensearch
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 1
    mem_limit: "1073741824"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    depends_on:
      opensearch:
        condition: service_started
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 0.5
    mem_limit: "536870912"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    depends_on:
      jaeger:
        condition: service_started
        required: true
      opensearch:
        condition: service_started
        required: true
      prometheus:
        condition: service_started
        required: true
    volumes:
      - type: bind
        source: ./services/otel/otel-collector-config.yaml
        target: /etc/otel-collector-config.yaml
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
      monitoring: null
    command:
      - --config=/etc/otel-collector-config.yaml
    cpus: 0.5
    mem_limit: "268435456"

  pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    volumes:
      - type: volume
        source: pgadmin_data
        target: /var/lib/pgadmin
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 0.5
    mem_limit: "268435456"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
    healthcheck:
      test:
        - CMD
        - pg_isready
        - -h
        - localhost
        - -p
        - "5432"
      timeout: 5s
      interval: 10s
      retries: 5
    cpus: 0.25
    mem_limit: "67108864"

  postgraphile:
    image: graphile/postgraphile:latest
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    command:
      - --connection
      - postgres://mindfield:mindfield_dev_password@postgres:5432/mindfield
      - --schema
      - public
      - --watch
      - --enhance-graphiql
      - --dynamic-json
      - --no-setof-functions-contain-nulls
      - --no-ignore-rbac
      - --show-error-stack=json
      - --extended-errors
      - hint,detail,errcode
      - --export-schema-graphql
      - /tmp/schema.graphql
      - --graphiql
      - /graphiql
      - --port
      - "5000"
    cpus: 0.5
    mem_limit: "268435456"

  postgres:
    image: postgres:15-alpine
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
        volume: {}
      - type: bind
        source: ./database/init
        target: /docker-entrypoint-initdb.d
        bind:
          create_host_path: true
    environment:
      POSTGRES_DB: ${MINDFIELD_POSTGRES_DB}
      POSTGRES_USER: ${MINDFIELD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MINDFIELD_POSTGRES_PASSWORD}
    env_file:
      - .env
    networks:
      backend: null
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U mindfield
      timeout: 5s
      interval: 10s
      retries: 5
    cpus: 1
    mem_limit: "536870912"

  postgrest:
    image: postgrest/postgrest:latest
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 0.25
    mem_limit: "134217728"

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    depends_on:
      redis:
        condition: service_healthy
        required: true
    volumes:
      - type: bind
        source: services/presidio-analyzer/healthcheck.sh
        target: /healthcheck.sh
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
    healthcheck:
      test:
        - CMD-SHELL
        - /healthcheck.sh
      timeout: 20s
      interval: 30s
      retries: 3
    cpus: 1
    mem_limit: "1073741824"

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    depends_on:
      presidio-analyzer:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
    cpus: 0.5
    mem_limit: "536870912"

  presidio-image-redactor:
    image: mcr.microsoft.com/presidio-image-redactor:latest
    depends_on:
      presidio-analyzer:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
    cpus: 1
    mem_limit: "1073741824"

  prisma-studio:
    image: timothyjmiller/prisma-studio:latest
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 0.5
    mem_limit: "268435456"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - type: bind
        source: ./services/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        bind:
          create_host_path: true
      - type: volume
        source: prometheus_data
        target: /prometheus
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
      monitoring: null
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    cpus: 0.5
    mem_limit: "536870912"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - type: bind
        source: ./services/promtail/promtail-config.yml
        target: /etc/promtail/config.yml
        bind:
          create_host_path: true
      - type: bind
        source: /var/log
        target: /var/log
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /var/lib/docker/containers
        target: /var/lib/docker/containers
        read_only: true
        bind:
          create_host_path: true
    env_file:
      - .env
    networks:
      backend: null
      monitoring: null
    command:
      - -config.file=/etc/promtail/config.yml
    cpus: 0.25
    mem_limit: "134217728"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    volumes:
      - type: volume
        source: rabbitmq_data
        target: /var/lib/rabbitmq
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - ping
      timeout: 10s
      interval: 30s
      retries: 5
    cpus: 0.5
    mem_limit: "268435456"

  redis:
    image: redis:7-alpine
    volumes:
      - type: volume
        source: redis_data
        target: /data
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "900"
      - "1"
      - --save
      - "300"
      - "10"
      - --save
      - "60"
      - "10000"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 5s
      interval: 10s
      retries: 5
    cpus: 0.5
    mem_limit: "268435456"

  redis-insight:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.redisinsight
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      redis:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:8001
      timeout: 5s
      interval: 10s
      retries: 5
    cpus: 0.5
    mem_limit: "536870912"

  redoc:
    image: redocly/redoc:latest
    depends_on:
      api:
        condition: service_started
        required: true
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 0.25
    mem_limit: "134217728"

  render:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        NODE_MAJOR: ${NODE_MAJOR}
        SERVICE: render
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    env_file:
      - .env
    networks:
      backend: null
    command:
      - node
      - dist/main.js
    cpus: 1
    mem_limit: "536870912"
    read_only: true
    tmpfs:
      - /tmp

  sonarqube:
    image: sonarqube:community
    depends_on:
      sonarqube-db:
        condition: service_healthy
        required: true
    volumes:
      - type: volume
        source: sonarqube_es7
        target: /opt/sonarqube/data/es7
        volume: {}
      - type: volume
        source: sonarqube_logs
        target: /opt/sonarqube/logs
        volume: {}
      - type: volume
        source: sonarqube_extensions
        target: /opt/sonarqube/extensions
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    cpus: 1
    mem_limit: "2147483648"

  sonarqube-db:
    image: postgres:15-alpine
    volumes:
      - type: volume
        source: sonarqube_db_data
        target: /var/lib/postgresql/data
        volume: {}
    environment:
      POSTGRES_DB: ${SONAR_POSTGRES_DB}
      POSTGRES_USER: ${SONAR_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD}
    env_file:
      - .env
    networks:
      backend: null
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sonarqube
      timeout: 5s
      interval: 10s
      retries: 5
    cpus: 0.5
    mem_limit: "268435456"

  storybook:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.storybook
      args:
        NODE_MAJOR: ${NODE_MAJOR}
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    volumes:
      - type: bind
        source: ./core/ui
        target: /app/core/ui
        bind:
          create_host_path: true
      - type: bind
        source: ./apps/web
        target: /app/apps/web
        bind:
          create_host_path: true
      - type: bind
        source: .
        target: /app
        bind:
          create_host_path: true
      - type: volume
        source: storybook_next
        target: /app/.next
        volume: {}
      - type: volume
        source: storybook_node_modules
        target: /app/apps/web/node_modules
        volume: {}
    env_file:
      - .env
    networks:
      frontend: null
    cpus: 0.5
    mem_limit: "536870912"

  submission:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        NODE_MAJOR: ${NODE_MAJOR}
        SERVICE: submission
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
