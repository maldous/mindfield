x-node-args: &node-args
  NODE_MAJOR: "${NODE_MAJOR:-24}"

x-build-env: &build-env
  DOCKER_BUILDKIT: "${DOCKER_BUILDKIT:-1}"
  BUILDKIT_PROGRESS: "${BUILDKIT_PROGRESS:-plain}"
  BUILDKIT_INLINE_CACHE: "${BUILDKIT_INLINE_CACHE:-1}"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

services:
  postgres:
    env_file:
      - .env
    image: postgres:15-alpine
    command: [
      "postgres",
      "-c",
      "shared_buffers=256MB",
      "-c",
      "effective_cache_size=1GB",
      "-c",
      "maintenance_work_mem=64MB",
      "-c",
      "checkpoint_completion_target=0.9",
      "-c",
      "wal_buffers=16MB",
      "-c",
      "default_statistics_target=100",
      "-c",
      "random_page_cost=1.1",
      "-c",
      "effective_io_concurrency=200",
    ]
    environment:
      POSTGRES_DB: ${MINDFIELD_POSTGRES_DB}
      POSTGRES_USER: ${MINDFIELD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MINDFIELD_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindfield"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 1.0
    networks:
      - backend

  pgbouncer:
    env_file:
      - .env
    image: edoburu/pgbouncer:latest
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 64m
    cpus: 0.25
    networks:
      - backend

  keycloak:
    env_file:
      - .env
    image: quay.io/keycloak/keycloak:latest
    volumes: [keycloak_data:/opt/keycloak/data]
    depends_on:
      pgbouncer: { condition: service_healthy }
      mailhog: { condition: service_healthy }
    command: start-dev
    mem_limit: 512m
    cpus: 0.5
    networks:
      - frontend
      - backend

  api:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.api
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs:
      - "/tmp"
    mem_limit: 512m
    cpus: 1.0
    networks:
      - backend

  web:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.web
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on: [api]
    read_only: true
    tmpfs:
      - "/tmp"
      - "/app/.next/cache"
    mem_limit: 512m
    cpus: 1.0
    networks:
      - frontend

  render:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        <<: *node-args
        SERVICE: render
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    command: ["node", "dist/main.js"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 512m
    cpus: 1.0
    networks:
      - backend

  transform:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        <<: *node-args
        SERVICE: transform
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    command: ["node", "dist/main.js"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend

  submission:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        <<: *node-args
        SERVICE: submission
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    command: ["node", "dist/main.js"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs: ["/tmp"]
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend

  grapesjs:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.grapesjs
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      pgbouncer: { condition: service_healthy }
      minio: { condition: service_healthy }
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend
      - frontend

  redis:
    env_file:
      - .env
    image: redis:7-alpine
    command: [
      "redis-server",
      "--appendonly",
      "yes",
      "--maxmemory",
      "128mb",
      "--maxmemory-policy",
      "allkeys-lru",
      "--save",
      "900",
      "1",
      "--save",
      "300",
      "10",
      "--save",
      "60",
      "10000",
    ]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend

  minio:
    env_file:
      - .env
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend

  mailhog:
    env_file:
      - .env
    image: mailhog/mailhog:latest
    mem_limit: 128m
    cpus: 0.25
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 3s
      retries: 3

  presidio-analyzer:
    env_file:
      - .env
    image: mcr.microsoft.com/presidio-analyzer:latest
    environment:
      - PRESIDIO_ANALYZER_ENTITIES_CACHE_TTL=3600
      - PRESIDIO_ANALYZER_DEFAULT_SCORE_THRESHOLD=0.35
    depends_on:
      redis: { condition: service_healthy }
    mem_limit: 1g
    cpus: 1.0
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  presidio-anonymizer:
    env_file:
      - .env
    image: mcr.microsoft.com/presidio-anonymizer:latest
    environment:
      - PRESIDIO_ANALYZER_HOST=presidio-analyzer
      - PRESIDIO_ANALYZER_PORT=5002
    depends_on:
      presidio-analyzer: { condition: service_healthy }
    mem_limit: 512m
    cpus: 0.5
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  presidio-image-redactor:
    env_file:
      - .env
    image: mcr.microsoft.com/presidio-image-redactor:latest
    environment:
      - PRESIDIO_ANALYZER_HOST=presidio-analyzer
      - PRESIDIO_ANALYZER_PORT=5002
    depends_on:
      presidio-analyzer: { condition: service_healthy }
    mem_limit: 1g
    cpus: 1.0
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mkdocs:
    env_file:
      - .env
    image: squidfunk/mkdocs-material:latest
    command: serve --dev-addr=0.0.0.0:8000
    volumes: ["./docs:/docs"]
    working_dir: /docs
    mem_limit: 128m
    cpus: 0.25
    networks:
      - backend
      - frontend

  prometheus:
    env_file:
      - .env
    image: prom/prometheus:latest
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    mem_limit: 512m
    cpus: 0.5
    networks:
      - monitoring
      - backend
      - frontend

  grafana:
    env_file:
      - .env
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on: [mailhog]
    mem_limit: 256m
    cpus: 0.5
    networks:
      - frontend
      - monitoring
    # Remove external port - will be accessed via Caddy
    # ports: ["3007:3000"]

  loki:
    env_file:
      - .env
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./services/loki/loki-config.yml:/etc/loki/local-config.yaml
    mem_limit: 512m
    cpus: 0.5
    networks:
      - monitoring
      - backend
      - frontend

  promtail:
    env_file:
      - .env
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./services/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    mem_limit: 128m
    cpus: 0.25
    networks:
      - monitoring
      - backend

  jaeger:
    env_file:
      - .env
    image: jaegertracing/all-in-one:latest
    mem_limit: 256m
    cpus: 0.5
    networks:
      - monitoring
      - backend
      - frontend

  alertmanager:
    image: prom/alertmanager:latest
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./services/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    mem_limit: 128m
    cpus: 0.25
    networks:
      - monitoring
      - backend
      - frontend

  caddy:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.caddy
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 128m
    cpus: 0.25
    ports: ["80:80", "443:443"]
    networks:
      - frontend
      - backend
      - monitoring

  rabbitmq:
    env_file:
      - .env
    image: rabbitmq:3-management-alpine
    volumes: [rabbitmq_data:/var/lib/rabbitmq]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend
      - frontend

  backup:
    env_file:
      - .env
    image: postgres:15-alpine
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh
    command: >
      sh -c "while true; do
               sleep 86400 &&
               pg_dumpall -h postgres -U mindfield > /backups/backup_$(date +%Y%m%d_%H%M%S).sql &&
               find /backups -name '*.sql' -mtime +7 -delete;
             done"
    depends_on: { postgres: { condition: service_healthy } }
    mem_limit: 128m
    cpus: 0.25

  kong-database:
    env_file:
      - .env
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${KONG_POSTGRES_DB}
      POSTGRES_USER: ${KONG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KONG_POSTGRES_PASSWORD}
    volumes: [kong_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend

  kong-migrations:
    env_file:
      - .env
    image: kong:3.4.0
    command: kong migrations bootstrap
    depends_on:
      kong-database: { condition: service_healthy }
    restart: "no"
    networks:
      - backend

  kong:
    env_file:
      - .env
    image: revomatico/docker-kong-oidc:3.4.0-2
    depends_on:
      kong-database: { condition: service_healthy }
      kong-migrations: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    cpus: 1.0
    networks:
      - frontend
      - backend

  kong-configure:
    env_file:
      - .env
    image: curlimages/curl:latest
    depends_on:
      kong: { condition: service_healthy }
    volumes:
      - ./services/kong/configure-kong.sh:/configure-kong.sh
    command: sh /configure-kong.sh
    restart: "no"
    networks:
      - backend

  opensearch:
    env_file:
      - .env
    environment:
      cluster.name: mindfield-cluster
      node.name: opensearch
      discovery.type: single-node
      bootstrap.memory_lock: true
    image: opensearchproject/opensearch:latest
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes: [opensearch_data:/usr/share/opensearch/data]
    mem_limit: 1g
    cpus: 1.0
    networks:
      - backend
      - frontend

  opensearch-dashboards:
    env_file:
      - .env
    image: opensearchproject/opensearch-dashboards:latest
    depends_on: [opensearch]
    mem_limit: 512m
    cpus: 0.5
    networks:
      - backend
      - frontend

  otel-collector:
    env_file:
      - .env
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./services/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on: [jaeger, prometheus, opensearch]
    mem_limit: 256m
    cpus: 0.5
    networks:
      - monitoring
      - backend
      - frontend

  node-exporter:
    env_file:
      - .env
    image: prom/node-exporter:latest
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    pid: host
    mem_limit: 128m
    cpus: 0.25
    networks:
      - monitoring
      - backend

  blackbox-exporter:
    env_file:
      - .env
    image: prom/blackbox-exporter:latest
    volumes:
      - ./services/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml
    mem_limit: 128m
    cpus: 0.25
    networks:
      - monitoring
      - backend

  uptime-kuma:
    env_file:
      - .env
    image: louislam/uptime-kuma:latest
    volumes: [uptime_kuma_data:/app/data]
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend
      - frontend

  trivy:
    env_file:
      - .env
    image: aquasec/trivy:latest
    command: ["server", "--listen", "0.0.0.0:8080"]
    volumes: [trivy_cache:/root/.cache]
    mem_limit: 512m
    cpus: 0.5
    networks:
      - backend
      - frontend

  step-ca:
    env_file:
      - .env
    image: smallstep/step-ca:latest
    volumes: [step_ca_data:/home/step]
    mem_limit: 128m
    cpus: 0.25
    networks:
      - backend
      - frontend

  postgrest:
    env_file:
      - .env
    image: postgrest/postgrest:latest
    depends_on:
      postgres: { condition: service_healthy }
    mem_limit: 128m
    cpus: 0.25
    networks:
      - backend
      - frontend

  hasura:
    env_file:
      - .env
    image: hasura/graphql-engine:latest
    depends_on:
      postgres: { condition: service_healthy }
    mem_limit: 512m
    cpus: 0.5
    networks:
      - backend
      - frontend

  postgraphile:
    env_file:
      - .env
    image: graphile/postgraphile:latest
    command: ["--connection", "${DATABASE_URL}", "--schema", "public", "--watch", "--enhance-graphiql", "--dynamic-json", "--no-setof-functions-contain-nulls", "--no-ignore-rbac", "--show-error-stack=json", "--extended-errors", "hint,detail,errcode", "--export-schema-graphql", "/tmp/schema.graphql", "--graphiql", "/graphiql", "--port", "5000"]
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend
      - frontend

  pgadmin:
    env_file:
      - .env
    image: dpage/pgadmin4:latest
    volumes: [pgadmin_data:/var/lib/pgadmin]
    depends_on:
      postgres: { condition: service_healthy }
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend
      - frontend

  prisma-studio:
    env_file:
      - .env
    image: timothyjmiller/prisma-studio:latest
    depends_on:
      postgres: { condition: service_healthy }
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend
      - frontend

  swagger-ui:
    env_file:
      - .env
    image: swaggerapi/swagger-ui:latest
    depends_on: [api]
    mem_limit: 128m
    cpus: 0.25
    networks:
      - backend
      - frontend

  redoc:
    env_file:
      - .env
    image: redocly/redoc:latest
    depends_on: [api]
    mem_limit: 128m
    cpus: 0.25
    networks:
      - backend
      - frontend

  storybook:
    env_file:
      - .env
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.storybook
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    volumes:
      - ./core/ui:/app/core/ui
      - ./apps/web:/app/apps/web
    mem_limit: 512m
    cpus: 0.5
    networks:
      - frontend

  sonarqube-db:
    env_file:
      - .env
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${SONAR_POSTGRES_DB}
      POSTGRES_USER: ${SONAR_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD}
    volumes: [sonarqube_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend

  sonarqube:
    env_file:
      - .env
    image: sonarqube:community
    depends_on:
      sonarqube-db: { condition: service_healthy }
    volumes:
      - sonarqube_es7:/opt/sonarqube/data/es7
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    mem_limit: 2g
    cpus: 1.0
    networks:
      - backend
      - frontend

volumes:
  caddy_config:
  caddy_data:
  grafana_data:
  keycloak_data:
  kong_db_data:
  minio_data:
  opensearch_data:
  pgadmin_data:
  postgres_data:
  prometheus_data:
  rabbitmq_data:
  redis_data:
  sonarqube_db_data:
  sonarqube_es7:
  sonarqube_extensions:
  sonarqube_logs:
  step_ca_data:
  trivy_cache:
  uptime_kuma_data:
