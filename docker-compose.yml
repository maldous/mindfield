env_file:
  - .env

x-node-args: &node-args
  NODE_MAJOR: "${NODE_MAJOR:-24}"

x-build-env: &build-env
  DOCKER_BUILDKIT: "${DOCKER_BUILDKIT:-1}"
  BUILDKIT_PROGRESS: "${BUILDKIT_PROGRESS:-plain}"
  BUILDKIT_INLINE_CACHE: "${BUILDKIT_INLINE_CACHE:-1}"

services:

  postgres:
    image: postgres:15-alpine
    command: [
      "postgres",
      "-c", "shared_buffers=256MB",
      "-c", "effective_cache_size=1GB",
      "-c", "maintenance_work_mem=64MB",
      "-c", "checkpoint_completion_target=0.9",
      "-c", "wal_buffers=16MB",
      "-c", "default_statistics_target=100",
      "-c", "random_page_cost=1.1",
      "-c", "effective_io_concurrency=200"
    ]
    environment:
      POSTGRES_DB: ${MINDFIELD_POSTGRES_DB}
      POSTGRES_USER: ${MINDFIELD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MINDFIELD_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mindfield" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 1.0
    ports: [ "5432:5432" ]

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: [ "CMD", "pg_isready", "-h", "localhost", "-p", "5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 64m
    cpus: 0.25
    ports: [ "6432:5432" ]

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    volumes: [keycloak_data:/opt/keycloak/data]
    depends_on:
      pgbouncer: {condition: service_healthy}
      mailhog: {condition: service_healthy}
    command: start-dev
    mem_limit: 512m
    cpus: 0.5
    ports: ["8081:8080"]

  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.api
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs:
      - "/tmp"
    mem_limit: 512m
    cpus: 1.0
    ports: [ "3001:3000" ]

  web:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.web
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on: [ api ]
    read_only: true
    tmpfs:
      - "/tmp"
      - "/app/.next/cache"
    mem_limit: 512m
    cpus: 1.0
    ports: [ "8000:3000" ]

  render:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        <<: *node-args
        SERVICE: render
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    command: [ "node", "dist/main.js" ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs: [ "/tmp" ]
    mem_limit: 512m
    cpus: 1.0
    ports: [ "3002:3000" ]

  transform:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        <<: *node-args
        SERVICE: transform
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    command: [ "node", "dist/main.js" ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs: [ "/tmp" ]
    mem_limit: 256m
    cpus: 0.5
    ports: [ "3003:3000" ]

  submission:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.services
      args:
        <<: *node-args
        SERVICE: submission
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    command: [ "node", "dist/main.js" ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    read_only: true
    tmpfs: [ "/tmp" ]
    mem_limit: 256m
    cpus: 0.5
    ports: [ "3004:3000" ]

  grapesjs:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.grapesjs
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      pgbouncer: { condition: service_healthy }
      minio: { condition: service_healthy }
    mem_limit: 256m
    cpus: 0.5
    ports: [ "3005:3000" ]

  redis:
    image: redis:7-alpine
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--maxmemory", "128mb",
      "--maxmemory-policy", "allkeys-lru",
      "--save", "900", "1",
      "--save", "300", "10",
      "--save", "60", "10000"
    ]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    ports: ["9000:9000","9001:9001"]

  mailhog:
    image: mailhog/mailhog:latest
    mem_limit: 128m
    cpus: 0.25
    ports: ["2025:1025","8025:8025"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 3s
      retries: 3

  redaction:
    build: 
      context: .
      dockerfile: dockerfiles/Dockerfile.redaction
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    depends_on:
      redis: {condition: service_healthy}
    mem_limit: 1g
    cpus: 1.0
    ports: ["3006:3000"]

  mkdocs:
    image: squidfunk/mkdocs-material:latest
    command: serve --dev-addr=0.0.0.0:8000
    volumes: ["./docs:/docs"]
    working_dir: /docs
    mem_limit: 128m
    cpus: 0.25
    ports: ["8001:8000"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    mem_limit: 512m
    cpus: 0.5
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on: [mailhog]
    mem_limit: 256m
    cpus: 0.5
    ports: ["3007:3000"]

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./services/loki/loki-config.yml:/etc/loki/local-config.yaml
    mem_limit: 512m
    cpus: 0.5
    ports: ["3100:3100"]

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./services/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    mem_limit: 128m
    cpus: 0.25

  jaeger:
    image: jaegertracing/all-in-one:latest
    mem_limit: 256m
    cpus: 0.5
    ports: ["16686:16686","14268:14268"]

  alertmanager:
    image: prom/alertmanager:latest
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./services/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    mem_limit: 128m
    cpus: 0.25
    ports: ["9093:9093"]

  caddy:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.caddy
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./keys:/etc/ssl/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 128m
    cpus: 0.25
    ports: ["8080:80","8443:443"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    volumes: [rabbitmq_data:/var/lib/rabbitmq]
    healthcheck:
      test: ["CMD","rabbitmq-diagnostics","ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    ports: ["5672:5672","15672:15672"]

  backup:
    image: postgres:15-alpine
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh
    command: >
      sh -c "while true; do
               sleep 86400 &&
               pg_dumpall -h postgres -U mindfield > /backups/backup_$(date +%Y%m%d_%H%M%S).sql &&
               find /backups -name '*.sql' -mtime +7 -delete;
             done"
    depends_on: {postgres: {condition: service_healthy}}
    mem_limit: 128m
    cpus: 0.25

  kong-database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${KONG_POSTGRES_DB}
      POSTGRES_USER: ${KONG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${KONG_POSTGRES_PASSWORD}
    volumes: [kong_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  kong-migrations:
    image: kong:latest
    command: kong migrations bootstrap
    depends_on:
      kong-database: {condition: service_healthy}
    restart: "no"

  kong:
    image: kong:latest
    depends_on:
      kong-database: {condition: service_healthy}
      kong-migrations: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    cpus: 1.0
    ports: ["8002:8000", "8444:8443", "8003:8001", "8445:8444"]

  opensearch:
    image: opensearchproject/opensearch:latest
    ulimits:
      memlock: {soft: -1, hard: -1}
      nofile: {soft: 65536, hard: 65536}
    volumes: [opensearch_data:/usr/share/opensearch/data]
    mem_limit: 1g
    cpus: 1.0
    ports: ["9200:9200", "9600:9600"]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    depends_on: [opensearch]
    mem_limit: 512m
    cpus: 0.5
    ports: ["5601:5601"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./services/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on: [jaeger, prometheus, opensearch]
    mem_limit: 256m
    cpus: 0.5
    ports: ["4317:4317", "4318:4318", "8888:8888", "8889:8889"]

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    pid: host
    mem_limit: 128m
    cpus: 0.25
    ports: ["9100:9100"]

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    volumes:
      - ./services/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml
    mem_limit: 128m
    cpus: 0.25
    ports: ["9115:9115"]

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    volumes: [uptime_kuma_data:/app/data]
    mem_limit: 256m
    cpus: 0.5
    ports: ["3018:3001"]

  trivy:
    image: aquasec/trivy:latest
    command: ["server", "--listen", "0.0.0.0:8080"]
    volumes: [trivy_cache:/root/.cache]
    mem_limit: 512m
    cpus: 0.5
    ports: ["8004:8080"]

  step-ca:
    image: smallstep/step-ca:latest
    volumes: [step_ca_data:/home/step]
    mem_limit: 128m
    cpus: 0.25
    ports: ["9443:9443"]

  postgrest:
    image: postgrest/postgrest:latest
    depends_on:
      postgres: {condition: service_healthy}
    mem_limit: 128m
    cpus: 0.25
    ports: ["3008:3000"]

  hasura:
    image: hasura/graphql-engine:latest
    depends_on:
      postgres: {condition: service_healthy}
    mem_limit: 512m
    cpus: 0.5
    ports: ["3009:8080"]

  postgraphile:
    image: graphile/postgraphile:latest
    command: ["--connection", "postgres://mindfield:mindfield_dev_password@postgres:5432/mindfield", "--schema", "public", "--watch", "--enhance-graphiql", "--dynamic-json", "--no-setof-functions-contain-nulls", "--no-ignore-rbac", "--show-error-stack=json", "--extended-errors", "hint,detail,errcode", "--export-schema-graphql", "/tmp/schema.graphql", "--graphiql", "/graphiql", "--port", "5000"]
    depends_on:
      postgres: {condition: service_healthy}
    mem_limit: 256m
    cpus: 0.5
    ports: ["3010:5000"]

  pgadmin:
    image: dpage/pgadmin4:latest
    volumes: [pgadmin_data:/var/lib/pgadmin]
    depends_on:
      postgres: {condition: service_healthy}
    mem_limit: 256m
    cpus: 0.5
    ports: ["3011:80"]

  prisma-studio:
    image: timothyjmiller/prisma-studio:latest
    depends_on:
      postgres: {condition: service_healthy}
    mem_limit: 256m
    cpus: 0.5
    ports: ["3012:5555"]

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    mem_limit: 128m
    cpus: 0.25
    ports: ["3013:8080"]

  redoc:
    image: redocly/redoc:latest
    mem_limit: 128m
    cpus: 0.25
    ports: ["3014:80"]

  storybook:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.storybook
      args:
        <<: *node-args
      cache_from:
        - type=registry,ref=localhost:5001/mindfield-cache
      cache_to:
        - type=registry,ref=localhost:5001/mindfield-cache,mode=max
    volumes:
      - ./core/ui:/app/core/ui
      - ./apps/web:/app/apps/web
    mem_limit: 512m
    cpus: 0.5
    ports: ["3015:6006"]

  sonarqube-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${SONAR_POSTGRES_DB}
      POSTGRES_USER: ${SONAR_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD}
    volumes: [sonarqube_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  sonarqube:
    image: sonarqube:community
    depends_on:
      sonarqube-db: {condition: service_healthy}
    volumes:
      - sonarqube_es7:/opt/sonarqube/data/es7
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    mem_limit: 2g
    cpus: 1.0
    ports: ["3016:9000"]

  gitea-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${GITEA_POSTGRES_DB}
      POSTGRES_USER: ${GITEA_POSTGRES_USER}
      POSTGRES_PASSWORD: ${GITEA_POSTGRES_PASSWORD}
    volumes: [gitea_db_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  gitea:
    image: gitea/gitea:latest
    depends_on:
      gitea-db: {condition: service_healthy}
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    mem_limit: 512m
    cpus: 0.5
    ports: ["3017:3000", "2222:22"]

volumes:

  caddy_config:
  caddy_data:
  gitea_data:
  gitea_db_data:
  grafana_data:
  keycloak_data:
  kong_db_data:
  minio_data:
  opensearch_data:
  pgadmin_data:
  postgres_data:
  prometheus_data:
  rabbitmq_data:
  redis_data:
  sonarqube_db_data:
  sonarqube_es7:
  sonarqube_extensions:
  sonarqube_logs:
  step_ca_data:
  trivy_cache:
  uptime_kuma_data:
