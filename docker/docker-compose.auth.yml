---
x-build-env:

  BUILDKIT_INLINE_CACHE: "1"
  BUILDKIT_PROGRESS: plain
  DOCKER_BUILDKIT: "1"

name: mindfield

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    depends_on:
      mailhog:
        condition: service_healthy
        required: true
      pgbouncer:
        condition: service_healthy
        required: true
    volumes:
      - type: volume
        source: keycloak_data
        target: /opt/keycloak/data
        volume: {}
    env_file:
      - .env
    networks:
      backend: null
      frontend: null
    command:
      - start
    cpus: 0.5
    mem_limit: "536870912"

  kong:
    image: kong/kong-gateway:latest
    depends_on:
      kong-bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    networks:
      - frontend
      - backend
    restart: on-failure

  kong-bootstrap:
    image: kong/kong-gateway:latest
    depends_on:
      kong-database:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - backend
    command: kong migrations bootstrap
    restart: on-failure

  kong-database:
    image: postgres:latest
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - backend
    restart: on-failure
    healthcheck:
      test:
        - "CMD"
        - "pg_isready"
        - "-U"
        - "kong"
      interval: 5s
      timeout: 10s
      retries: 10
